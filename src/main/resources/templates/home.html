<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>Home</title>
</head>
<body>
<div class="content-wrapper">
    <div class="hero text-center mb-5">
        <div class="container">
            <h1 class="display-4 fw-bold mb-4">Find Your Dream Job Today</h1>
            <p class="lead mb-4">Explore thousands of job opportunities with all the information you need.</p>
            <form class="d-flex justify-content-center" th:action="@{/jobs}" method="get">
                <div class="input-group" style="max-width: 600px;">
                    <input type="text" class="form-control form-control-lg" name="keyword" placeholder="Search by job title...">
                    <button class="btn btn-dark btn-lg" type="submit">Search Jobs</button>
                </div>
            </form>
        </div>
    </div>

    <div class="container mb-5">
        <h2 class="text-center mb-4">Latest Job Opportunities</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="job, iter : ${jobs}" th:if="${iter.index < 6}">
                <div class="card h-100 shadow-sm border-0 job-card hover-lift">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="badge bg-primary rounded-pill" th:text="${job.category}">Category</span>
                            <small class="text-muted" th:text="${#temporals.format(job.postedDate, 'dd MMM yyyy')}">Date</small>
                        </div>
                        <h5 class="card-title fw-bold" th:text="${job.title}">Job Title</h5>
                        <h6 class="card-subtitle mb-3 text-muted">
                            <i class="bi bi-building"></i> <span th:text="${job.companyName}">Company</span>
                        </h6>
                        <ul class="list-unstyled text-muted small mb-4">
                            <li><i class="bi bi-geo-alt-fill me-2"></i><span th:text="${job.location}">Location</span></li>
                            <li><i class="bi bi-cash-stack me-2"></i><span th:text="${job.salary}">Salary</span></li>
                            <li><i class="bi bi-briefcase me-2"></i><span th:text="${job.experienceRequired}">Experience</span></li>
                        </ul>
                        <a th:href="@{/job-details/{id}(id=${job.id})}" class="btn btn-outline-primary w-100">View Details</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-center mt-5">
            <a th:href="@{/jobs}" class="btn btn-primary btn-lg px-5 rounded-pill shadow">Browse All Jobs <i class="bi bi-arrow-right ms-2"></i></a>
        </div>
    </div>
    
    <style>
        .hover-lift { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out; }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,.1) !important; }
    </style>
</div>
</body>
</html>
