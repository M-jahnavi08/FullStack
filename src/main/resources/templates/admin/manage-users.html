<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>Manage Users</title>
</head>
<body>
<div class="content-wrapper container mt-4 mb-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm border-0 bg-dark text-white">
                <div class="card-body text-center p-4">
                    <div class="display-1 text-light mb-3"><i class="bi bi-shield-lock"></i></div>
                    <h5 class="fw-bold mb-1" sec:authentication="principal.user.fullName">Admin</h5>
                    <p class="text-muted small mb-0">System Administrator</p>
                </div>
                <div class="list-group list-group-flush border-top border-secondary">
                    <a th:href="@{/admin/dashboard}" class="list-group-item list-group-item-action bg-dark text-white border-secondary"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a th:href="@{/admin/manage-users}" class="list-group-item list-group-item-action bg-dark text-white active border-secondary"><i class="bi bi-people me-2"></i> Manage Users</a>
                    <a th:href="@{/admin/manage-jobs}" class="list-group-item list-group-item-action bg-dark text-white border-secondary"><i class="bi bi-briefcase me-2"></i> Manage Jobs</a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9">
            <h3 class="fw-bold mb-4">Manage Users</h3>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Joined On</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}">ID</td>
                                    <td class="fw-bold" th:text="${user.fullName}">Name</td>
                                    <td th:text="${user.email}">Email</td>
                                    <td>
                                        <span th:if="${user.role.name() == 'STUDENT'}" class="badge bg-info text-dark">STUDENT</span>
                                        <span th:if="${user.role.name() == 'EMPLOYER'}" class="badge bg-success">EMPLOYER</span>
                                        <span th:if="${user.role.name() == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                                    </td>
                                    <td th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Date</td>
                                    <td>
                                        <a th:if="${user.role.name() != 'ADMIN'}" th:href="@{/admin/user/delete/{id}(id=${user.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this user completely? This will also delete all their associated jobs and applications.')">
                                            <i class="bi bi-trash-fill"></i> Delete
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
