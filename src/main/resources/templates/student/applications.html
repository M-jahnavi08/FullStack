<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>My Applications</title>
</head>
<body>
<div class="content-wrapper container mt-4 mb-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <div class="display-1 text-primary mb-3"><i class="bi bi-person-circle"></i></div>
                    <h5 class="fw-bold mb-1" sec:authentication="principal.user.fullName">Student Name</h5>
                </div>
                <div class="list-group list-group-flush border-top">
                    <a th:href="@{/student/dashboard}" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a th:href="@{/student/profile}" class="list-group-item list-group-item-action"><i class="bi bi-person me-2"></i> My Profile</a>
                    <a th:href="@{/student/applications}" class="list-group-item list-group-item-action active"><i class="bi bi-file-earmark-text me-2"></i> My Applications</a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-file-earmark-text me-2"></i>Application History</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Job Detail</th>
                                    <th>Applied On</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="app : ${applications}">
                                    <td>
                                        <div class="d-flex flex-column">
                                            <a th:href="@{/job-details/{id}(id=${app.job.id})}" class="fw-bold text-decoration-none" th:text="${app.job.title}">Job Title</a>
                                            <small class="text-muted"><i class="bi bi-building me-1"></i><span th:text="${app.job.companyName}">Company</span></small>
                                            <small class="text-muted"><i class="bi bi-geo-alt me-1"></i><span th:text="${app.job.location}">Location</span></small>
                                        </div>
                                    </td>
                                    <td th:text="${#temporals.format(app.appliedDate, 'dd MMM yyyy HH:mm')}">Date</td>
                                    <td>
                                        <span th:if="${app.status == 'APPLIED'}" class="badge bg-secondary px-3 py-2">APPLIED</span>
                                        <span th:if="${app.status == 'SHORTLISTED'}" class="badge bg-success px-3 py-2">SHORTLISTED</span>
                                        <span th:if="${app.status == 'REJECTED'}" class="badge bg-danger px-3 py-2">REJECTED</span>
                                    </td>
                                </tr>
                                <tr th:if="${applications.empty}">
                                    <td colspan="3" class="text-center py-5">
                                        <i class="bi bi-folder-x display-4 text-muted mb-3 d-block"></i>
                                        <h5 class="text-muted">No Applications Found</h5>
                                        <p class="text-muted">You haven't applied to any jobs yet.</p>
                                        <a th:href="@{/jobs}" class="btn btn-primary mt-2">Browse Jobs</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
