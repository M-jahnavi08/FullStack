<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>All Jobs</title>
</head>
<body>
<div class="content-wrapper container mt-4 mb-5">
    
    <div class="card shadow-sm mb-4">
        <div class="card-body bg-light rounded">
            <form class="row g-3 align-items-center" th:action="@{/jobs}" method="get">
                <div class="col-md-9">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" name="keyword" th:value="${param.keyword}" placeholder="Job title, keywords, or company...">
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary btn-lg w-100">Search</button>
                </div>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold">Found <span class="text-primary" th:text="${jobs.size()}"></span> Jobs</h4>
    </div>

    <div class="row row-cols-1 g-4">
        <div class="col" th:each="job : ${jobs}">
            <div class="card h-100 shadow-sm border-0 job-card hover-lift">
                <div class="card-body p-4">
                    <div class="row align-items-center">
                        <div class="col-md-9">
                            <div class="d-flex align-items-center mb-2">
                                <span class="badge bg-info text-dark rounded-pill me-2" th:text="${job.category}">Category</span>
                                <small class="text-muted"><i class="bi bi-clock me-1"></i>Posted on <span th:text="${#temporals.format(job.postedDate, 'dd MMM yyyy')}"></span></small>
                            </div>
                            <h4 class="card-title fw-bold text-dark mb-1" th:text="${job.title}">Job Title</h4>
                            <h6 class="text-muted mb-3"><i class="bi bi-building me-1"></i><span th:text="${job.companyName}">Company</span></h6>
                            
                            <div class="d-flex flex-wrap gap-3 text-muted small">
                                <div><i class="bi bi-geo-alt-fill text-danger me-1"></i><span th:text="${job.location}">Location</span></div>
                                <div><i class="bi bi-cash-stack text-success me-1"></i><span th:text="${job.salary}">Salary</span></div>
                                <div><i class="bi bi-briefcase-fill text-warning me-1"></i><span th:text="${job.experienceRequired}">Experience</span></div>
                            </div>
                        </div>
                        <div class="col-md-3 text-md-end mt-3 mt-md-0">
                            <a th:href="@{/job-details/{id}(id=${job.id})}" class="btn btn-outline-primary px-4 py-2 fw-bold">View Details</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${jobs.empty}" class="col-12 text-center py-5">
            <i class="bi bi-search display-1 text-muted mb-3"></i>
            <h3>No jobs found matching your criteria.</h3>
            <p class="text-muted">Try adjusting your search keywords.</p>
        </div>
    </div>
    <style>
        .hover-lift { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out; border-left: 5px solid transparent !important; }
        .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,.08) !important; border-left: 5px solid #0d6efd !important; }
    </style>
</div>
</body>
</html>
