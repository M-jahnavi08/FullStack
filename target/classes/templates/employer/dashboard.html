<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>Employer Dashboard</title>
</head>
<body>
<div class="content-wrapper container mt-4 mb-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <div class="display-1 text-primary mb-3"><i class="bi bi-building"></i></div>
                    <h5 class="fw-bold mb-1" sec:authentication="principal.user.fullName">Company Name</h5>
                    <p class="text-muted small mb-0">Employer Account</p>
                </div>
                <div class="list-group list-group-flush border-top">
                    <a th:href="@{/employer/dashboard}" class="list-group-item list-group-item-action active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a th:href="@{/employer/job/post}" class="list-group-item list-group-item-action"><i class="bi bi-plus-circle me-2"></i> Post a Job</a>
                    <a th:href="@{/employer/manage-jobs}" class="list-group-item list-group-item-action"><i class="bi bi-briefcase me-2"></i> Manage Jobs</a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9">
            <h3 class="fw-bold mb-4">Employer Dashboard</h3>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="card bg-primary text-white shadow h-100 border-0 rounded-3">
                        <div class="card-body d-flex align-items-center">
                            <div class="display-4 me-3"><i class="bi bi-briefcase-fill"></i></div>
                            <div>
                                <h2 class="fw-bold mb-0" th:text="${jobs.size()}">0</h2>
                                <span>Active Job Postings</span>
                            </div>
                        </div>
                        <div class="card-footer bg-primary border-top-0 d-grid">
                            <a th:href="@{/employer/manage-jobs}" class="btn btn-primary bg-opacity-10 text-white btn-sm">View All Jobs <i class="bi bi-arrow-right"></i></a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card bg-success text-white shadow h-100 border-0 rounded-3">
                        <div class="card-body d-flex align-items-center justify-content-center flex-column text-center">
                            <h5 class="fw-bold mb-3">Looking for new talent?</h5>
                            <a th:href="@{/employer/job/post}" class="btn btn-light fw-bold text-success px-4 rounded-pill shadow-sm"><i class="bi bi-plus-lg me-2"></i> Post New Job</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0 mt-4">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-clock-history me-2"></i>Recently Posted Jobs</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Job Title</th>
                                    <th>Posted Date</th>
                                    <th>Location</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="job, iter : ${jobs}" th:if="${iter.index < 5}">
                                    <td class="fw-bold" th:text="${job.title}">Job Title</td>
                                    <td th:text="${#temporals.format(job.postedDate, 'dd MMM yyyy')}">Date</td>
                                    <td th:text="${job.location}">Location</td>
                                    <td>
                                        <a th:href="@{/employer/job/{id}/applicants(id=${job.id})}" class="btn btn-sm btn-outline-info">View Applicants</a>
                                    </td>
                                </tr>
                                <tr th:if="${jobs.empty}">
                                    <td colspan="4" class="text-center py-4 text-muted">You haven't posted any jobs yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
