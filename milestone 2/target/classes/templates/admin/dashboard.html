<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>Admin Dashboard</title>
</head>
<body>
<div class="content-wrapper container mt-4 mb-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm border-0 bg-dark text-white">
                <div class="card-body text-center p-4">
                    <div class="display-1 text-light mb-3"><i class="bi bi-shield-lock"></i></div>
                    <h5 class="fw-bold mb-1" sec:authentication="principal.user.fullName">Admin</h5>
                    <p class="text-muted small mb-0">System Administrator</p>
                </div>
                <div class="list-group list-group-flush border-top border-secondary">
                    <a th:href="@{/admin/dashboard}" class="list-group-item list-group-item-action bg-dark text-white active border-secondary"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a th:href="@{/admin/manage-users}" class="list-group-item list-group-item-action bg-dark text-white border-secondary"><i class="bi bi-people me-2"></i> Manage Users</a>
                    <a th:href="@{/admin/manage-jobs}" class="list-group-item list-group-item-action bg-dark text-white border-secondary"><i class="bi bi-briefcase me-2"></i> Manage Jobs</a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9">
            <h3 class="fw-bold mb-4">System Overview</h3>

            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="card bg-primary text-white shadow h-100 border-0 rounded-3">
                        <div class="card-body d-flex align-items-center">
                            <div class="display-4 me-3"><i class="bi bi-people-fill"></i></div>
                            <div>
                                <h2 class="fw-bold mb-0" th:text="${totalUsers}">0</h2>
                                <span>Total Users</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-success text-white shadow h-100 border-0 rounded-3">
                        <div class="card-body d-flex align-items-center">
                            <div class="display-4 me-3"><i class="bi bi-briefcase-fill"></i></div>
                            <div>
                                <h2 class="fw-bold mb-0" th:text="${totalJobs}">0</h2>
                                <span>Total Jobs</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-info text-white shadow h-100 border-0 rounded-3">
                        <div class="card-body d-flex align-items-center">
                            <div class="display-4 me-3"><i class="bi bi-file-earmark-text-fill"></i></div>
                            <div>
                                <h2 class="fw-bold mb-0" th:text="${totalApplications}">0</h2>
                                <span>Applications</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-5">
                <div class="col-md-6 mb-4">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body text-center p-5">
                            <i class="bi bi-person-lines-fill display-1 text-primary mb-3"></i>
                            <h4 class="fw-bold">User Management</h4>
                            <p class="text-muted">View, manage, and delete users from the system.</p>
                            <a th:href="@{/admin/manage-users}" class="btn btn-outline-primary">Manage Users</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body text-center p-5">
                            <i class="bi bi-briefcase-fill display-1 text-success mb-3"></i>
                            <h4 class="fw-bold">Job Management</h4>
                            <p class="text-muted">Review, manage, and remove job postings.</p>
                            <a th:href="@{/admin/manage-jobs}" class="btn btn-outline-success">Manage Jobs</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
