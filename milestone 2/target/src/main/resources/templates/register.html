<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>Register</title>
</head>
<body>
<div class="content-wrapper container">
    <div class="row justify-content-center mt-4 mb-5">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center py-3">
                    <h4 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Create an Account</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/register}" method="post" th:object="${user}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control" th:field="*{fullName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email address</label>
                            <input type="email" class="form-control" th:field="*{email}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" th:field="*{password}" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">I am a...</label>
                            <select class="form-select" th:field="*{role}" required>
                                <option value="STUDENT">Student / Job Seeker</option>
                                <option value="EMPLOYER">Employer / Company</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Register</button>
                    </form>
                    <div class="text-center mt-4">
                        <p>Already have an account? <a th:href="@{/login}" class="text-decoration-none">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
