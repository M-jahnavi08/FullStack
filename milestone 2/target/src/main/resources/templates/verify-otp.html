<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>Verify Email - Job Portal</title>
</head>
<body>
<div class="content-wrapper d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-header bg-primary text-white text-center p-4 border-0">
                        <i class="bi bi-envelope-check display-4 mb-3 d-block text-white"></i>
                        <h4 class="fw-bold mb-0">Verify Your Email</h4>
                        <p class="mb-0 text-white-50 mt-1">We've sent a 6-digit code to your email</p>
                    </div>
                    <div class="card-body p-4 p-md-5 bg-white">
                        
                        <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill flex-shrink-0 me-2"></i>
                            <div th:text="${error}">Invalid code</div>
                        </div>

                        <form th:action="@{/verify-otp}" method="post">
                            <input type="hidden" name="email" th:value="${email}">
                            
                            <div class="mb-4 text-center">
                                <label for="otp" class="form-label text-muted fw-bold">Enter OTP Code</label>
                                <input type="text" class="form-control form-control-lg text-center fw-bold fs-3 tracking-widest" 
                                       id="otp" name="otp" required maxlength="6" pattern="\d{6}" 
                                       placeholder="------" style="letter-spacing: 0.5em;" autofocus>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm rounded-3">
                                Verify & Continue <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </form>
                        
                        <div class="text-center mt-4 pt-3 border-top">
                            <p class="text-muted small">For demonstration purposes, check the terminal console where the application is running to find your OTP.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
