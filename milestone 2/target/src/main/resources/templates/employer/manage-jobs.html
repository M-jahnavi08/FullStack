<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>Manage Jobs</title>
</head>
<body>
<div class="content-wrapper container mt-4 mb-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <div class="display-1 text-primary mb-3"><i class="bi bi-building"></i></div>
                    <h5 class="fw-bold mb-1" sec:authentication="principal.user.fullName">Company</h5>
                </div>
                <div class="list-group list-group-flush border-top">
                    <a th:href="@{/employer/dashboard}" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a th:href="@{/employer/job/post}" class="list-group-item list-group-item-action"><i class="bi bi-plus-circle me-2"></i> Post a Job</a>
                    <a th:href="@{/employer/manage-jobs}" class="list-group-item list-group-item-action active"><i class="bi bi-briefcase me-2"></i> Manage Jobs</a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold mb-0">Manage Job Postings</h3>
                <a th:href="@{/employer/job/post}" class="btn btn-primary"><i class="bi bi-plus me-1"></i>New Job</a>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Job Title</th>
                                    <th>Category</th>
                                    <th>Posted Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="job : ${jobs}">
                                    <td>
                                        <div class="fw-bold text-dark" th:text="${job.title}">Job Title</div>
                                        <small class="text-muted"><i class="bi bi-geo-alt me-1"></i><span th:text="${job.location}"></span></small>
                                    </td>
                                    <td><span class="badge bg-secondary" th:text="${job.category}">Category</span></td>
                                    <td th:text="${#temporals.format(job.postedDate, 'dd MMM yyyy')}">Date</td>
                                    <td>
                                        <div class="btn-group" role="group">
                                            <a th:href="@{/employer/job/{id}/applicants(id=${job.id})}" class="btn btn-sm btn-outline-primary" title="View Applicants">
                                                <i class="bi bi-people-fill"></i> Applicants
                                            </a>
                                            <a th:href="@{/job-details/{id}(id=${job.id})}" class="btn btn-sm btn-outline-info" title="View Job" target="_blank">
                                                <i class="bi bi-eye-fill"></i>
                                            </a>
                                            <a th:href="@{/employer/job/delete/{id}(id=${job.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this job posting?')" title="Delete Job">
                                                <i class="bi bi-trash-fill"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${jobs.empty}">
                                    <td colspan="4" class="text-center py-5">
                                        <i class="bi bi-inbox display-4 text-muted d-block mb-3"></i>
                                        <h5 class="text-muted">No Job Postings Found</h5>
                                        <p class="text-muted">Create a job posting to start receiving applications.</p>
                                        <a th:href="@{/employer/job/post}" class="btn btn-primary">Post your first job</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
