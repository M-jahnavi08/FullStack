<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(content=~{::div.content-wrapper})}">
<head>
    <title>Manage Applicants</title>
</head>
<body>
<div class="content-wrapper container mt-4 mb-5">
    <div class="mb-3">
        <a th:href="@{/employer/manage-jobs}" class="text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Back to Manage Jobs</a>
    </div>

    <div class="card shadow-sm border-0 mb-4 bg-primary text-white">
        <div class="card-body p-4 d-flex justify-content-between align-items-center">
            <div>
                <h3 class="fw-bold mb-1" th:text="${job.title}">Job Title</h3>
                <p class="mb-0"><i class="bi bi-geo-alt me-1"></i><span th:text="${job.location}"></span> | Posted on <span th:text="${#temporals.format(job.postedDate, 'dd MMM yyyy')}"></span></p>
            </div>
            <div class="text-end">
                <div class="display-6 fw-bold" th:text="${applications.size()}">0</div>
                <small>Total Applicants</small>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 fw-bold"><i class="bi bi-people-fill me-2"></i>Applicant Details</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Candidate</th>
                            <th>Contact Info</th>
                            <th>Applied Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app : ${applications}">
                            <td>
                                <div class="fw-bold" th:text="${app.student.fullName}">Name</div>
                                <small class="text-muted d-block">Exp: <span th:text="${app.student.experience}"></span></small>
                                <small class="text-info d-block" th:text="${app.student.skills}"></small>
                            </td>
                            <td>
                                <div><a th:href="'mailto:' + ${app.student.email}" class="text-decoration-none" th:text="${app.student.email}">Email</a></div>
                                <div class="text-muted small" th:text="${app.student.phone}">Phone</div>
                                <div th:if="${app.student.resumePath != null}">
                                    <a th:href="@{'/uploads/resumes/' + ${app.student.resumePath}}" target="_blank" class="badge bg-secondary text-decoration-none mt-1"><i class="bi bi-file-earmark-pdf me-1"></i>View Resume</a>
                                </div>
                            </td>
                            <td th:text="${#temporals.format(app.appliedDate, 'dd MMM yyyy')}">Date</td>
                            <td>
                                <span th:if="${app.status == 'APPLIED'}" class="badge bg-secondary px-3 py-2">APPLIED</span>
                                <span th:if="${app.status == 'SHORTLISTED'}" class="badge bg-success px-3 py-2">SHORTLISTED</span>
                                <span th:if="${app.status == 'REJECTED'}" class="badge bg-danger px-3 py-2">REJECTED</span>
                            </td>
                            <td>
                                <form th:action="@{/employer/application/{id}/status(id=${app.id})}" method="post" class="d-flex">
                                    <input type="hidden" name="jobId" th:value="${job.id}">
                                    <select name="status" class="form-select form-select-sm me-2" style="width: auto;" onchange="this.form.submit()">
                                        <option value="APPLIED" th:selected="${app.status == 'APPLIED'}">Applied</option>
                                        <option value="SHORTLISTED" th:selected="${app.status == 'SHORTLISTED'}">Shortlist</option>
                                        <option value="REJECTED" th:selected="${app.status == 'REJECTED'}">Reject</option>
                                    </select>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${applications.empty}">
                            <td colspan="5" class="text-center py-5">
                                <i class="bi bi-people display-4 text-muted d-block mb-3"></i>
                                <h5 class="text-muted">No Applicants Yet</h5>
                                <p class="text-muted">You have no applications for this job posting.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
