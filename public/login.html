<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white shadow-lg rounded-xl p-8 w-96">

<h2 class="text-2xl font-bold text-center mb-2">Welcome Back 👋</h2>
<p class="text-gray-500 text-center mb-6">Login to your account</p>

<div class="mb-4 flex items-center border rounded-lg px-3">
<i data-feather="user" class="w-4"></i>
<input id="username" placeholder="Username" class="w-full p-2 outline-none">
</div>

<div class="mb-4 flex items-center border rounded-lg px-3">
<i data-feather="lock" class="w-4"></i>
<input id="password" type="password" placeholder="Password" class="w-full p-2 outline-none">
</div>

<button onclick="login()" 
class="w-full bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition">
Login
</button>

</div>

<script src="js/login.js"></script>

<script>
feather.replace();
</script>

</body>
</html>
