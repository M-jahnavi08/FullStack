<<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex">

<!-- SIDEBAR -->
<div class="w-60 bg-white h-screen shadow p-5">

<h2 class="text-xl font-bold mb-6">InventoryPro</h2>

<a href="index.html" class="block mb-3">📊 Dashboard</a>
<a href="products.html" class="block mb-3 font-medium">📦 Products</a>
<a href="home.html" class="block mb-3">🏠 Home</a>

</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<h1 class="text-2xl font-bold mb-4">Products</h1>

<!-- ADD FORM -->
<div class="bg-white p-4 rounded shadow mb-4">

<input id="name" placeholder="Name" class="border p-2 m-1">
<input id="category" placeholder="Category" class="border p-2 m-1">
<input id="price" type="number" placeholder="Price" class="border p-2 m-1">
<input id="quantity" type="number" placeholder="Qty" class="border p-2 m-1">

<button onclick="addProduct()" class="bg-blue-500 text-white px-4 py-2 rounded">
Add Product
</button>

</div>

<!-- FILTER -->
<div class="mb-4">
<button onclick="showAll()" class="bg-gray-300 px-3 py-1">All</button>
<button onclick="showInStock()" class="bg-green-400 px-3 py-1">In Stock</button>
<button onclick="showOutStock()" class="bg-red-400 px-3 py-1">Out</button>
</div>

<!-- PRODUCTS -->
<div id="productsContainer" class="grid grid-cols-3 gap-4"></div>

</div>

<script src="js/script.js"></script>

</body>
</html>
