<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100 flex">

<!-- SIDEBAR -->
<div class="w-60 bg-white h-screen shadow p-5">

<h2 class="text-xl font-bold mb-6">InventoryPro</h2>

<a href="index.html" class="block mb-3 font-medium">📊 Dashboard</a>
<a href="products.html" class="block mb-3">📦 Products</a>
<a href="home.html" class="block mb-3">🏠 Home</a>

</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<h1 class="text-2xl font-bold mb-6">Dashboard</h1>

<!-- STATS -->
 <div style="margin:10px;">
<button onclick="showAll()">All</button>
<button onclick="showInStock()">In Stock</button>
<button onclick="showOutStock()">Out of Stock</button>
</div>
<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-white p-5 rounded shadow">
<h3>Total Products</h3>
<p id="totalProducts" class="text-xl font-bold">0</p>
</div>

<div class="bg-white p-5 rounded shadow">
<h3>Total Stock</h3>
<p id="totalStock" class="text-xl font-bold">0</p>
</div>

<div class="bg-white p-5 rounded shadow">
<h3>Low Stock</h3>
<p id="lowStock" class="text-xl font-bold text-red-500">0</p>
</div>

</div>

<!-- CHART -->
<div class="bg-white p-5 rounded shadow">
<h2 class="mb-4 font-semibold">Stock Overview</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script src="js/script.js"></script>

<script>
function loadChart(){

fetch("/api/products")
.then(res=>res.json())
.then(data=>{

const names = data.map(p=>p.name);
const qty = data.map(p=>p.quantity);

new Chart(document.getElementById("chart"), {
type: "bar",
data: {
labels: names,
datasets: [{
label: "Stock",
data: qty
}]
}
});

});

}

loadChart();
</script>

</body>
</html>
